# config/config_prod.yaml
base_url: "https://www.baidu.com"

browser:
  type: chrome
  headless: true
  timeout: 10
  window_size: "1920x1080"

wait:
  implicit: 10
  explicit: 20
  poll_frequency: 0.5

screenshot:
  on_failure: true
  save_dir: "screenshots"

log:
  level: WARNING
  file: "logs/prod.log"
  rotation: "10MB"

report:
  dir: "reports/allure-results"
  clean: true