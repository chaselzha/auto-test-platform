# pytest.ini
[pytest]

# ===== 测试执行选项 =====
addopts =
    -vs
    --tb=short
    --strict-markers
    --alluredir=automation/reports/allure-results
    --clean-alluredir
    --maxfail=5
    --color=yes
    --reruns=2
    --reruns-delay=5
    --timeout=60

# ===== 测试路径 =====
testpaths = automation/tests

# ===== 测试文件匹配 =====
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ===== 自定义标记 =====
markers =
    smoke: 冒烟测试 - 核心功能验证
    regression: 回归测试 - 确保已有功能正常
    web: Web 测试 - 浏览器自动化测试
    edge: 边界测试 - 边界条件验证
    negative: 负面测试 - 异常场景验证
    ui: UI 测试 - 用户界面测试
    special-char: 特殊字符测试 - 特殊字符输入验证
    scroll: 滚动测试 - 页面滚动功能验证
    slow: 慢速测试 - 执行时间较长的测试

# ===== 日志配置 =====
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# ===== 控制台输出 =====
console_output_style = progress

# ===== 超时配置 =====
timeout = 60
timeout_method = thread