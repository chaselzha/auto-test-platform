# pytest.ini
[pytest]
addopts =
    -vs
    --tb=short
    --strict-markers
    --alluredir=automation/reports/allure-results
    --clean-alluredir
    --maxfail=5
    --color=yes
    --reruns=2
    --reruns-delay=5
    --timeout=60

testpaths = automation/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: 冒烟测试 - 核心功能验证
    regression: 回归测试 - 确保已有功能正常
    web: Web 测试 - 浏览器自动化测试
    edge: 边界测试 - 边界条件验证
    negative: 负面测试 - 异常场景验证
    ui: UI 测试 - 用户界面测试
    image: 图片搜索测试
    suggestion: 搜索建议测试
    scroll: 滚动测试
    filter: 过滤测试
    navigation: 导航测试
    responsive: 响应式测试
    keyboard: 键盘交互测试
    random: 随机测试
    slow: 慢速测试 - 执行时间较长的测试

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
console_output_style = progress

# 超时配置
timeout = 60
timeout_method = thread